<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffd1dc">
    <meta name="application-name" content="For You">
    <meta name="apple-mobile-web-app-title" content="For You">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <title id="dynamicPageTitle">For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        @media print {
            html, body {
                display: none !important;
                height: 0 !important;
                overflow: hidden !important;
                visibility: hidden !important;
            }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #ffd1dc, #ffb7c5);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #8a1c4a;
            -webkit-overflow-scrolling: touch;
        }
        
        /* SECURITY OVERLAY */
        #security-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .security-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }

        .security-text {
            font-family: 'Montserrat', sans-serif;
            color: #d81b60;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .security-sub {
            font-size: 14px;
            color: #888;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* TOAST NOTIFICATION */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-left: 5px solid #d81b60;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInDown 0.5s ease-out forwards;
            pointer-events: auto;
            transition: opacity 0.5s;
        }

        .toast.hide { opacity: 0; }
        .toast-icon { font-size: 24px; }
        .toast-content { display: flex; flex-direction: column; }
        .toast-title { font-weight: bold; color: #d81b60; font-size: 14px; }
        .toast-msg { font-size: 13px; color: #555; }

        @keyframes slideInDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Password Modal */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        
        .password-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: bounceIn 1s forwards;
        }
        
        .password-content h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            margin-bottom: 20px;
            color: #d81b60;
        }
        
        .password-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb7c5;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        .password-input:focus {
            border-color: #d81b60;
        }
        
        .submit-btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s, transform 0.2s;
        }
        
        .submit-btn:hover {
            background: #b71550;
            transform: scale(1.05);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .notification-btn {
            background: #ffb7c5;
            color: #d81b60;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            margin-right: auto;
            transition: background 0.3s;
        }

        .notification-btn:hover {
            background: #ff9eb0;
        }
        
        /* Modal Common Styles */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 550px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
            z-index: 10;
        }
        
        .close-modal:hover {
            color: #d81b60;
        }

        /* Admin Styles */
        .admin-trigger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            z-index: 2000;
            color: #d81b60;
        }

        /* Admin User Selection */
        #adminUserSelection {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
        }

        .user-select-btn {
            padding: 12px;
            background: #fff0f5;
            border: 2px solid #ffb7c5;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #d81b60;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .user-select-btn:hover {
            background: #d81b60;
            color: white;
        }

        /* Main Admin Tabs Container */
        #adminTabsAndContent {
            display: none;
            padding-top: 10px;
        }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .admin-tab-btn {
            background: none;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            color: #888;
            white-space: nowrap;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .admin-tab-btn.active {
            color: white;
            background: #d81b60;
        }

        .admin-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .admin-panel.active {
            display: block;
        }
        
        .admin-form-group {
            margin-bottom: 15px;
        }
        
        .admin-section-title {
            color: #d81b60; 
            margin-bottom: 10px; 
            font-size: 16px; 
            font-weight: bold;
            border-bottom: 1px dashed #ffb7c5;
            padding-bottom: 5px;
        }

        .admin-list-container {
            max-height: 200px; 
            overflow-y: auto; 
            border: 2px solid #ffe4e9; 
            border-radius: 12px; 
            padding: 8px; 
            background: #fffafc;
            margin-bottom: 15px;
        }

        .admin-list-item, .admin-song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            background: white;
            margin-bottom: 4px;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .admin-thumbnail {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 10px;
        }

        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.2s;
        }
        
        .delete-btn:hover {
            background: #d32f2f;
        }

        .device-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ddd;
            font-size: 13px;
        }
        
        .device-card.recent {
            border-left-color: #28a745;
            background: #f0fff4;
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .device-meta {
            color: #666;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .device-location {
            color: #d81b60;
        }

        .gh-status-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .gh-btn {
            background: #24292e;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            max-width: 250px;
        }
        
        .repo-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe4e9;
            border-radius: 12px;
            margin-bottom: 10px;
            margin-top: 5px;
            font-family: 'Montserrat', sans-serif;
            background: #fff9fb;
            font-size: 15px;
            color: #555;
            outline: none;
        }
        
        .file-input-wrapper {
            margin-bottom: 15px;
            border: 2px dashed #ffb7c5;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: #fff5f7;
            transition: all 0.3s;
        }
        
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd1dc, #ffb7c5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99;
            transition: opacity 0.8s ease;
        }
        
        .welcome-message {
            font-family: 'Dancing Script', cursive;
            font-size: 48px;
            color: #d81b60;
            text-align: center;
            animation: pulse 2s infinite, float 3s ease-in-out infinite;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .logout-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd1dc, #ffb7c5);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 101;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            margin-top: 50px;
            position: relative;
            z-index: 100;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab {
            background: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #d81b60;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab.active {
            background: white;
            color: #d81b60;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .content-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }
        
        @keyframes slideInOpposite {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #gallery.active {
            display: block;
            animation: slideInOpposite 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .tab-content.active {
            display: block;
        }
        
        .letter {
            padding: 20px;
            background: #fff5f7;
            border-radius: 15px;
            border: 2px dashed #ffb7c5;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .letter h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: #d81b60;
        }
        
        .letter-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            -webkit-user-select: text;
            user-select: text;
        }
        
        .letter.expanded .letter-content {
            max-height: 60vh; 
            overflow-y: auto; 
            padding-right: 10px;
        }
        
        /* Modern Music Player Styles */
        .modern-player {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15);
            border: 1px solid rgba(255, 183, 197, 0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .visualizer-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }

        .beat-wave {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 3px solid rgba(216, 27, 96, 0.4);
            box-shadow: 0 0 15px rgba(216, 27, 96, 0.2);
            z-index: 0;
            transition: transform 0.05s ease-out, opacity 0.05s ease-out;
        }

        .liquid-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.2);
            position: relative;
            overflow: hidden;
            background: #fff0f5;
            z-index: 1;
        }

        .liquid {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #d81b60;
            transition: top 0.1s linear; 
        }

        .liquid-time {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-weight: bold;
            color: #d81b60;
            font-size: 18px;
            mix-blend-mode: difference;
            color: #fff;
        }

        .control-btn {
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.1);
            color: #d81b60;
            transition: all 0.2s;
        }

        .control-btn.main-play {
            width: 65px;
            height: 65px;
            font-size: 28px;
            background: linear-gradient(135deg, #d81b60, #b71550);
            color: white;
        }

        .song {
            background: #fff0f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }
        
        .song-animated {
            opacity: 0;
            transform: translateX(20px);
            animation: songFadeIn 0.4s ease-out forwards;
        }

        @keyframes songFadeIn { to { opacity: 1; transform: translateX(0); } }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .gallery-item {
            border-radius: 10px;
            overflow: hidden;
            height: 150px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            opacity: 0;
            animation: galleryFadeIn 0.6s ease-out forwards;
        }
        
        @keyframes galleryFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .music-layout { display: flex; gap: 20px; }

        .artist-list-container {
            flex-basis: 30%;
            max-height: 400px;
            overflow-y: auto;
            border-right: 1px dashed #ffb7c5;
        }

        #songListContainer { flex-basis: 70%; max-height: 400px; overflow-y: auto; }

        .artist-header {
            font-weight: bold;
            cursor: pointer;
            background: #f8e8ee;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            color: #d81b60;
            transition: all 0.3s;
        }

        .artist-header.active-artist { background: #d81b60; color: white; }

        .heart, .teddy-bear { position: absolute; z-index: -1; opacity: 0.2; pointer-events: none; }
        
        .heart { color: #d81b60; font-size: 24px; animation: float 6s ease-in-out infinite; }
        
        .teddy-bear { font-size: 32px; animation: float 8s ease-in-out infinite; }

        .tulip-drop { position: absolute; font-size: 30px; animation: tulipFall 5s linear forwards; top: -10%; z-index: 0; pointer-events: none; }

        @keyframes tulipFall {
            0% { top: -10%; opacity: 1; transform: translateX(0) rotate(0deg); }
            100% { top: 110%; opacity: 0; transform: translateX(20px) rotate(360deg); }
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        .fw-input, .fw-textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe4e9;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 16px;
            background-color: #fff9fb;
            color: #555;
            outline: none;
        }

        .fw-message-card {
            background: #fff0f5;
            border: 1px solid #ffb7c5;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #d81b60;
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="security-overlay">
        <div class="security-icon">🙈</div>
        <div class="security-text">Hidden Content</div>
    </div>
    <div id="tulipRainContainer"></div>

    <div class="password-modal" id="passwordModal">
        <div class="password-content">
            <h2>Enter the secret code</h2>
            <input type="password" class="password-input" id="passwordInput" placeholder="The special word...">
            <button class="submit-btn" id="submitPassword">Enter</button>
        </div>
    </div>

    <div class="custom-modal" id="adminModal">
        <div class="modal-content">
            <span class="close-modal" id="closeAdminModal">&times;</span>
            <h2 style="color: #d81b60; font-family: 'Dancing Script', cursive;">Admin Console</h2>
            
            <div id="adminUserSelection">
                <p style="color: #666; margin-bottom: 20px;">Who are you managing today?</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="user-select-btn" data-target-user="mica">Mica</button>
                    <button class="user-select-btn" data-target-user="angel">Angel</button>
                    <button class="user-select-btn" data-target-user="kate" style="grid-column: span 2;">Kate</button>
                </div>
            </div>

            <div id="adminTabsAndContent">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, setDoc, deleteDoc, getDoc, doc, onSnapshot, serverTimestamp, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithPopup, GithubAuthProvider } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCPq_nCm9udajtm6-blItmSqgA0NuEOemI",
            authDomain: "mica-cutie.firebaseapp.com",
            databaseURL: "https://mica-cutie-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mica-cutie",
            storageBucket: "mica-cutie.firebasestorage.app",
            messagingSenderId: "323886769074",
            appId: "1:323886769074:web:a0a97cee18d40d05597aab",
            measurementId: "G-N60M2CTS9H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = sessionStorage.getItem('loggedInUser') || null;

        async function init() {
            if(!auth.currentUser) await signInAnonymously(auth);
            if(currentUser) window.loadUserContent(currentUser);
        }

        window.loadUserContent = (user) => {
            currentUser = user;
            setupDynamicContent(user);
            setupGallery(user);
            setupFreedomWall(user);
            setupAdminListeners();
        };

        function setupDynamicContent(user) {
            onSnapshot(query(collection(db, `${user}_love_letters`), orderBy('timestamp', 'desc')), (snap) => {
                const container = document.getElementById('lettersContainer');
                container.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `<div class="letter"><h3>${d.title}</h3><div class="letter-content">${d.content}</div></div>`;
                }).join('');
                document.querySelectorAll('.letter').forEach(l => l.onclick = () => l.classList.toggle('expanded'));
            });

            onSnapshot(doc(db, 'content', `${user}_daily_notes`), (snap) => {
                const container = document.getElementById('notesContainer');
                if(snap.exists()) {
                    container.innerHTML = snap.data().items.map(n => `<div class="fw-message-card">${n}</div>`).join('');
                }
            });

            onSnapshot(collection(db, 'songs'), (snap) => {
                const songs = snap.docs.map(d => d.data());
                window.updateAllSongs(songs);
                const artistList = document.getElementById('artistList');
                const groups = {};
                songs.forEach(s => { if(!groups[s.artist]) groups[s.artist] = []; groups[s.artist].push(s); });
                artistList.innerHTML = Object.keys(groups).map(a => `<div class="artist-header" onclick="showSongs('${a}')">${a}</div>`).join('');
                window.showSongs = (a) => {
                    document.getElementById('songListContainer').innerHTML = groups[a].map(s => `
                        <div class="song song-animated">
                            <span>${s.title}</span>
                            <button class="control-btn" onclick="playSong('${s.title}', '${s.artist}', '${s.url}')">▶️</button>
                        </div>
                    `).join('');
                };
            });
        }

        function setupGallery(user) {
            onSnapshot(query(collection(db, `${user}_gallery`), orderBy('timestamp', 'desc')), (snap) => {
                const g = document.getElementById('publicGallery');
                g.innerHTML = snap.docs.map(d => `<div class="gallery-item"><img src="${d.data().url}"></div>`).join('');
            });
        }

        function setupFreedomWall(user) {
            onSnapshot(query(collection(db, `${user}_messages`), orderBy('timestamp', 'desc')), (snap) => {
                document.getElementById('fwMessagesContainer').innerHTML = snap.docs.map(d => {
                    const data = d.data();
                    return `<div class="fw-message-card"><b>${data.name}</b><br>${data.message}</div>`;
                }).join('');
            });
            document.getElementById('fwPostBtn').onclick = async () => {
                const name = document.getElementById('fwName').value;
                const message = document.getElementById('fwMessage').value;
                await addDoc(collection(db, `${user}_messages`), { name, message, timestamp: serverTimestamp() });
            };
        }

        function setupAdminListeners() {
            document.getElementById('postLetterBtn').onclick = async () => {
                const title = document.getElementById('adminLetterTitle').value;
                const content = document.getElementById('adminLetterContent').value;
                const dateLabel = document.getElementById('adminLetterDate').value;
                const target = document.getElementById('adminTargetLabel').dataset.user;
                await addDoc(collection(db, `${target}_love_letters`), { title, content, dateLabel, timestamp: serverTimestamp() });
                alert("Posted!");
            };
        }

        init();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('passwordInput');
            const submitBtn = document.getElementById('submitPassword');
            let audioCtx;

            submitBtn.onclick = () => {
                const p = passwordInput.value.toLowerCase();
                let user = (p === 'micacutie' ? 'mica' : p === 'angelcutie' ? 'angel' : p === 'katecutie' ? 'kate' : null);
                if(user) {
                    sessionStorage.setItem('loggedInUser', user);
                    location.reload();
                } else {
                    alert("Wrong word, cutie!");
                }
            };

            const saved = sessionStorage.getItem('loggedInUser');
            if(saved) {
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('welcomeMsg').innerText = `Welcome ${saved}!`;
            }

            // Tabs Logic
            document.querySelectorAll('.tab').forEach(t => {
                t.onclick = () => {
                    if(t.id === 'logoutButton') { sessionStorage.clear(); location.reload(); return; }
                    document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
                    t.classList.add('active');
                    document.getElementById(t.dataset.tab).classList.add('active');
                };
            });

            // Admin Logic
            const adminBtn = document.getElementById('openAdminBtn');
            adminBtn.onclick = () => {
                if(prompt("Admin Pass:") === "admin123") {
                    document.getElementById('adminModal').style.display = 'flex';
                }
            };
            document.querySelectorAll('.user-select-btn').forEach(b => {
                b.onclick = () => {
                    const u = b.dataset.targetUser;
                    document.getElementById('adminUserSelection').style.display = 'none';
                    document.getElementById('adminTabsAndContent').style.display = 'block';
                    document.getElementById('adminTargetLabel').innerText = `Managing: ${u.toUpperCase()}`;
                    document.getElementById('adminTargetLabel').dataset.user = u;
                };
            });
            document.getElementById('backToUserSelect').onclick = () => {
                document.getElementById('adminUserSelection').style.display = 'grid';
                document.getElementById('adminTabsAndContent').style.display = 'none';
            };

            // Audio Logic
            const audio = document.getElementById('nowPlayingAudio');
            const playBtn = document.getElementById('mainPlayBtn');
            let allSongs = [];

            window.updateAllSongs = (s) => allSongs = s;
            window.playSong = (t, a, u) => {
                document.getElementById('playerTitle').innerText = t;
                document.getElementById('playerArtist').innerText = a;
                audio.src = u;
                audio.play();
                initVisualizer();
            };

            playBtn.onclick = () => {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                audio.paused ? audio.play() : audio.pause();
                playBtn.innerText = audio.paused ? '▶️' : '⏸️';
            };

            function initVisualizer() {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyzer = audioCtx.createAnalyser();
                const src = audioCtx.createMediaElementSource(audio);
                src.connect(analyzer);
                analyzer.connect(audioCtx.destination);
                const data = new Uint8Array(analyzer.frequencyBinCount);
                function frame() {
                    analyzer.getByteFrequencyData(data);
                    const avg = data.reduce((a,b) => a+b) / data.length;
                    document.getElementById('beatWave').style.transform = `scale(${1 + avg/255})`;
                    requestAnimationFrame(frame);
                }
                frame();
            }

            audio.ontimeupdate = () => {
                const p = (audio.currentTime / audio.duration) * 100;
                document.getElementById('liquidWave').style.top = `${100 - p}%`;
                const m = Math.floor(audio.currentTime / 60);
                const s = Math.floor(audio.currentTime % 60);
                document.getElementById('liquidTimeText').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            // Clock
            setInterval(() => {
                document.getElementById('phClock').innerText = new Date().toLocaleTimeString('en-PH', {timeZone: 'Asia/Manila'});
            }, 1000);
        });
    </script>
